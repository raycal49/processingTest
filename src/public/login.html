<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name= "author" content = "Raymond Calderon">
    <link rel="stylesheet" href="/stylesheets/style.css">
    <script src="/js/login.js" defer></script>
    <title>Phone Co</title>
</head>

<body >
    <header>
        <nav>
            <a href="index.html"> Home </a>
        </nav>
    </header>

    <main id="loginPageBody">
        <form id="userinfo" action="/auth/login"  method="POST" >
            <h1> Welcome </h1>
            <p class="subtitle"> Sign into your account. </p>

            <div id="inputGroup">
                <label for="username"> Username:  </label>
                <input type="text" placeholder="Enter username" name="username"/>
                <span class="error" id="emailError" aria-live="polite"> </span>
            </div>

            <div id="inputGroup">
                <label for="password"> Password:  </label>
                <input type="password" placeholder="Enter password" name="password"/>
                <span class="passwordError"> </span>
            </div>
            
            <p> Don't have an account?
                <a href="/register.html">Register here</a>
            </p>
        
            <div class="inputGroup">
                <label for="submit"> </label>

                <button id="submit_button" type="button"> Submit </button>
            </div>
        </form>
    </main>

    <footer>
        <p >
            <a href="about.html"> About us </a>
        </p>
    </footer>
</body>
