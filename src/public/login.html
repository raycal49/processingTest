<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Raymond Calderon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/stylesheets/style.css">
    <script src="/js/login.js" defer></script>
    <title>Phone Co</title>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="index.html">Phone Co</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navLinks"
                        aria-controls="navLinks" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navLinks">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-4">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <form id="userinfo" action="/auth/login" method="POST">
                                <h1 class="h3 mb-1 text-center">Welcome</h1>
                                <p class="subtitle text-muted text-center mb-4">Sign into your account.</p>

                                <div class="mb-3">
                                    <label for="username" class="form-label">Username</label>
                                    <input type="text" class="form-control" id="username" name="username"
                                           placeholder="Enter username" autocomplete="username" required />
                                    <span class="invisible text-danger small" id="username-error" aria-live="polite">Username is required</span>
                                </div>

                                <div class="mb-3">
                                    <label for="password" class="form-label">Password</label>
                                    <input type="password" class="form-control" id="password" name="password"
                                           placeholder="Enter password" autocomplete="current-password" required />
                                    <span class="invisible text-danger small" id="password-error" aria-live="polite">Password is required</span>
                                </div>

                                <!-- form-level errors (wrong credentials, server trouble) -- text is filled in by login.js -->
                                <span class="invisible text-danger small d-block mb-2" id="form-error" aria-live="polite"></span>

                                <p class="small">Don't have an account?
                                    <a href="/register.html">Register here</a>
                                </p>

                                <button id="submit-button" type="submit" class="btn btn-primary w-100">Submit</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-3 text-muted">
        <p class="mb-0"><a href="about.html">About us</a></p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
