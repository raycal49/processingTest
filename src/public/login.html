<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name= "author" content = "Raymond Calderon">
    <link rel="stylesheet" href="/stylesheets/style.css">
    <script src="/js/login.js" defer></script>
    <title>Phone Co</title>
</head>

<body >
    <header>
        <nav>
            <a href="index.html"> Home </a>
        </nav>
    </header>

    <main id="loginPageBody">
        <form id="userinfo" action="/auth/login"  method="POST" >
            <h1> Welcome </h1>
            <p class="subtitle"> Sign into your account. </p>

            <div class="inputGroup">
                <label for="username"> Username: </label>
                <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="username" required />
            </div>

            <span class=invisible id="username-error" style="color:red" aria-live="polite"> Username is required</span>

            <div class="inputGroup">
                <label for="password"> Password: </label>
                <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required />
            </div>

            <span class=invisible id="password-error" style="color:red" aria-live="polite"> Password is required</span>

            <!-- form-level errors (wrong credentials, server trouble) -- text is filled in by login.js -->
            <span class=invisible id="form-error" style="color:red" aria-live="polite"> </span>

            <p> Don't have an account?
                <a href="/register.html">Register here</a>
            </p>

            <div class="inputGroup">
                <label for="submit-button"> </label>
                <button id="submit-button" type="submit"> Submit </button>
            </div>
        </form>
    </main>

    <footer>
        <p >
            <a href="about.html"> About us </a>
        </p>
    </footer>
</body>
