<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name= "author" content = "Raymond Calderon">
    <link rel="stylesheet" href="/stylesheets/style.css">
    <script src="/js/register.js" defer></script>
    <title>Phone Co</title>
</head>

<body>
    <header>
        <nav>
            <a href="index.html"> Home </a>
        </nav>
    </header>

    <main id="loginPageBody">
        <form id="userinfo" action="/auth/register"  method="POST" >
            <h1> Make a new account </h1>

            <div class="inputGroup">
                <label for="username"> Username: </label>
                <input type="text" name="username" placeholder="Enter your username" minlength="5" maxlength="15" required /> 
            </div>

            <span class=invisible id="username-error" style="color:red"> Username must contain between five to twelve characters and may only contain alphanumeric characters</span>

            <div class="inputGroup">
                <label for="email"> Email: </label>
                <input type="email" name="email" placeholder="you@company.com" required/>
            </div>

            <span class=invisible id="email-error" style="color:red"> Invalid email</span>

            <div class="inputGroup">
                <label for="password" > Password: </label>
                <input type="password" name="password" placeholder="Enter your password"  minlength="5" maxlength="12" required/>
                <!-- <span id="password-error" hidden style="color:red"> Your password needs at least 8 characters, one uppercase letter, and one number.</span> -->
            </div>

            <span class=invisible id="password-error" style="color:red"> <small> Passwords must be at least 8 characters long, with an one uppercase letter, and a number. </small></span>

            <p> Already have an account?
                <a href="/login.html">Login here</a>
            </p>

            <div class="inputGroup">
                <label for="submit-button"> </label>
                <button id="submit-button" type="submit"> Register </button>
            </div>

        </form>
    </main>

    <footer>
        <p >
            <a href="about.html"> About us </a>
        </p>
    </footer>
</body>
