<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Raymond Calderon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/stylesheets/style.css">
    <script src="/js/register.js" defer></script>
    <title>Phone Co</title>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="index.html">Phone Co</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navLinks"
                        aria-controls="navLinks" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navLinks">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- one centered card, so flex utilities do the centering (no grid needed) -->
    <main class="container py-5 d-flex justify-content-center">
        <div class="card shadow-sm form-card">
            <div class="card-body">
                <form id="userinfo" action="/auth/register" method="POST">
                    <h1 class="h3 mb-4 text-center">Make a new account</h1>

                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username"
                               placeholder="Enter your username" minlength="5" maxlength="15" required />
                        <span class="invisible text-danger small" id="username-error">Username must contain between five to twelve characters and may only contain alphanumeric characters</span>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email"
                               placeholder="you@company.com" required />
                        <span class="invisible text-danger small" id="email-error">Invalid email</span>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Enter your password" minlength="5" maxlength="12" required />
                        <span class="invisible text-danger small" id="password-error">Passwords must be at least 8 characters long, with an one uppercase letter, and a number.</span>
                    </div>

                    <p class="small">Already have an account?
                        <a href="/login.html">Login here</a>
                    </p>

                    <button id="submit-button" type="submit" class="btn btn-primary w-100">Register</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="text-center py-3 text-muted">
        <p class="mb-0"><a href="about.html">About us</a></p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
