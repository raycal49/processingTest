<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Raymond Calderon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/stylesheets/style.css">
    <script src="/js/dashboard.js" defer></script>
    <title>Phone Co</title>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="index.html">Phone Co</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navLinks"
                        aria-controls="navLinks" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navLinks">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <section class="card shadow-sm">
                        <div class="card-body">
                            <h1 class="h3">Dashboard</h1>
                            <p class="subtitle text-muted">Welcome back.</p>

                            <!-- shown briefly after a payment; dashboard.js fills in the receipt id -->
                            <div id="paidBanner" class="alert alert-success hidden" role="alert">
                                Payment received &mdash; receipt #<span id="receiptId"></span>
                            </div>

                            <!-- exactly one of the next two sections is unhidden by dashboard.js,
                                 depending on whether /subscriptions/me returns a subscription -->
                            <div id="myPlanSection" class="hidden">
                                <h2 class="h5">My Plan</h2>
                                <p class="mb-1"><span id="planName"></span></p>
                                <p class="mb-1"><span id="planPrice"></span></p>
                                <p class="mb-1">Member since <span id="planSince"></span></p>
                                <p><a href="/plans.html">Change plan</a></p>
                            </div>

                            <div id="pickPlanPrompt" class="hidden">
                                <h2 class="h5">No plan yet</h2>
                                <p>You don't have a plan. Pick one to get started!</p>
                                <p><a href="/plans.html">Pick a plan</a></p>
                            </div>

                            <!-- form-level errors (server trouble) -- text is filled in by dashboard.js -->
                            <span class="invisible text-danger small d-block mb-2" id="form-error" aria-live="polite"></span>

                            <button id="logout-button" type="button" class="btn btn-outline-secondary">Log out</button>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-3 text-muted">
        <p class="mb-0"><a href="about.html">About us</a></p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
