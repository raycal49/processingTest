<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name= "author" content = "Raymond Calderon">
    <link rel="stylesheet" href="/stylesheets/style.css">
    <script src="/js/dashboard.js" defer></script>
    <title>Phone Co</title>
</head>

<body>
    <header>
        <nav>
            <a href="index.html"> Home </a>
        </nav>
    </header>

    <main id="loginPageBody">
        <section class="card">
            <h1> Dashboard </h1>
            <p class="subtitle"> Welcome back. </p>

            <!-- shown briefly after a payment; dashboard.js fills in the receipt id -->
            <div id="paidBanner" class="inputGroup hidden">
                <p style="color:green"> Payment received &mdash; receipt #<span id="receiptId"></span> </p>
            </div>

            <!-- exactly one of the next two sections is unhidden by dashboard.js,
                 depending on whether /subscriptions/me returns a subscription -->
            <div id="myPlanSection" class="inputGroup hidden">
                <h2> My Plan </h2>
                <p> <span id="planName"></span> </p>
                <p> <span id="planPrice"></span> </p>
                <p> Member since <span id="planSince"></span> </p>
                <p> <a href="/plans.html">Change plan</a> </p>
            </div>

            <div id="pickPlanPrompt" class="inputGroup hidden">
                <h2> No plan yet </h2>
                <p> You don't have a plan. Pick one to get started! </p>
                <p> <a href="/plans.html">Pick a plan</a> </p>
            </div>

            <!-- form-level errors (server trouble) -- text is filled in by dashboard.js -->
            <span class=invisible id="form-error" style="color:red" aria-live="polite"> </span>

            <div class="inputGroup">
                <button id="logout-button" type="button"> Log out </button>
            </div>
        </section>
    </main>

    <footer>
        <p >
            <a href="about.html"> About us </a>
        </p>
    </footer>
</body>
</html>
